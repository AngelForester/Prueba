<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Hosanna</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
    <header>
        <h1>HOSANNA</h1>
        </header>

    <section style="max-width: 400px; margin: 40px auto; text-align: left;">
        <h2>Iniciar Sesión</h2>
        
        <form id="form-login" onsubmit="procesarLogin(event)">
            <label>Usuario / Correo:</label>
            <input type="text" id="usuario-login" required>
            
            <label>Contraseña:</label>
            <input type="password" required>
            
            <label>Autenticación Multifactor (MFA):</label>
            <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"></div>
            <span id="err-captcha" style="color:red; display:none; font-size:0.8rem;">Por favor, verifica que no eres un robot.</span>

            <button type="submit" class="btn-interactivo" style="width:100%;">Ingresar</button>
        </form>

        <div style="margin-top: 15px;">
            <a href="#" onclick="mostrarRecuperacion()" style="color: var(--primary);">¿Olvidaste tu contraseña?</a>
        </div>

        <div id="recuperacion-box" style="display:none; margin-top: 20px; padding: 15px; border: 1px dashed var(--accent);">
            <h4>Recuperar Contraseña</h4>
            <input type="email" id="correo-recuperacion" placeholder="Tu correo electrónico">
            <button onclick="simularRecuperacion()" class="btn-interactivo">Enviar enlace</button>
            <div id="msg-recuperacion" style="color: green; margin-top: 10px; display:none;">
                Simulación: Se ha enviado un correo con instrucciones dinámicamente.
            </div>
        </div>
    </section>

    <script>
        function procesarLogin(e) {
            e.preventDefault();
            // Validar reCAPTCHA
            var response = grecaptcha.getResponse();
            if(response.length == 0) {
                document.getElementById('err-captcha').style.display = 'block';
                return;
            }
            // Guardar usuario en LocalStorage (Base de datos simulada)
            const usuario = document.getElementById('usuario-login').value;
            localStorage.setItem('usuarioActivo', usuario);
            alert("Acceso Concedido. Bienvenido " + usuario);
            window.location.href = "index.html";
        }

        function mostrarRecuperacion() {
            document.getElementById('recuperacion-box').style.display = 'block';
        }

        function simularRecuperacion() {
            const correo = document.getElementById('correo-recuperacion').value;
            if(correo.includes('@')) {
                document.getElementById('msg-recuperacion').style.display = 'block';
            } else {
                alert("Ingrese un correo válido");
            }
        }
    </script>
</body>
</html>
