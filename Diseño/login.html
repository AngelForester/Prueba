<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Hosanna</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>HOSANNA</h1>
    </header>
    <div class="breadcrumbs-bar" id="breadcrumbs"></div>

    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <main style="max-width: 500px;">
        <form onsubmit="Controlador.procesarLogin(event)">
            <h2 style="text-align:center; color: var(--primary);">Iniciar Sesión</h2>
            <label>Usuario (Usa 'admin' para rol Administrador):</label>
            <input type="text" id="usuario-login" required>
            <label>Contraseña:</label>
            <input type="password" required>
            
            <label>Seguridad (MFA):</label>
            <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI" style="margin-bottom: 15px;"></div>
            <span id="err-captcha" style="color:red; display:none;">Confirma que no eres un robot.</span>

            <button type="submit" class="btn">Ingresar</button>
            <p style="text-align:center; margin-top:15px;">
                <a href="#" onclick="document.getElementById('modal-recuperar').style.display='block'">¿Olvidaste tu contraseña?</a>
            </p>
        </form>

        <div id="modal-recuperar" style="display:none; background: var(--white); padding: 25px; border-radius:10px; box-shadow: var(--shadow); margin-top: 20px; border-left: 4px solid var(--accent);">
            <form onsubmit="Controlador.simularRecuperacion(event)" style="box-shadow:none; padding:0;">
                <h4>Recuperar Contraseña</h4>
                <p style="font-size: 0.9rem; color: #666;">Ingresa tu correo para enviarte un enlace de seguridad.</p>
                <input type="email" id="correo-recuperacion" placeholder="tu@correo.com" required>
                <button type="submit" id="btn-recuperar" class="btn">Enviar Enlace</button>
                <div id="msg-recuperacion" style="display:none; margin-top: 15px; padding: 10px; background: #E8F5E9; color: #2E7D32; border-radius: 5px;"></div>
            </form>
        </div>
    </main>

    <script src="js/modelo.js"></script>
    <script src="js/controlador.js"></script>
</body>
</html>
