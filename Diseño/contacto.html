<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - Hosanna</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>HOSANNA</h1>
        <nav>
            <a href="index.html" data-i18n="inicio">Inicio</a>
            <a href="nosotros.html" data-i18n="nosotros">Nosotros</a>
            <a href="servicios.html" data-i18n="cachorros">Cachorros</a>
            <a href="contacto.html" data-i18n="contacto" style="color: var(--accent);">Contacto</a>
            <div id="nav-auth"><a href="login.html" data-i18n="login">Ingresar</a></div>
            <select id="selector-idioma" onchange="Controlador.cambiarIdioma(this.value)"><option value="es">Español</option><option value="en">English</option></select>
            <button onclick="Controlador.toggleAltoContraste()">🌗</button>
        </nav>
    </header>
    <div class="breadcrumbs-bar" id="breadcrumbs"></div>

    <main style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start;">
        <section>
            <h2 data-i18n="contacto" style="color: var(--primary);">Contacto</h2>
            <p>Envíenos sus dudas sobre disponibilidad de ejemplares o productos de cuidado.</p>
            
            <form onsubmit="Controlador.procesarContacto(event)">
                <label>Nombre Completo:</label>
                <input type="text" id="nombre-contacto" required>
                
                <label>Correo Electrónico:</label>
                <input type="email" id="correo-contacto" required>
                
                <label>Mensaje:</label>
                <textarea id="mensaje-contacto" rows="5" required></textarea>
                
                <button type="submit" class="btn">Enviar Mensaje</button>
                <div id="msg-contacto-exito" style="display:none; color: #2E7D32; background: #E8F5E9; padding: 10px; margin-top: 15px; border-radius: 5px;">
                    ¡Mensaje guardado en la base de datos exitosamente!
                </div>
            </form>
        </section>

        <section style="background: var(--white); padding: 20px; border-radius: 10px; box-shadow: var(--shadow);">
            <h3 style="color: var(--primary); margin-top: 0;">Nuestra Ubicación</h3>
            <p>Visítenos en nuestras instalaciones principales en Piedras Negras, Coahuila.</p>
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d111663.5350482283!2d-100.62772710156554!3d28.708170258299105!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x86f9c5d0f1bdffb1%3A0xcb1b5eeb24f6a738!2sPiedras%20Negras%2C%20Coah.!5e0!3m2!1ses!2smx!4v1710000000000!5m2!1ses!2smx" 
                width="100%" 
                height="350" 
                style="border:2px solid var(--accent); border-radius: 5px;" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </section>
    </main>

    <script src="js/modelo.js"></script>
    <script src="js/controlador.js"></script>
</body>
</html>
